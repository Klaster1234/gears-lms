<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240" role="img" aria-label="Youthfully Yours SK">
  <!-- Three overlapping circles in the brand colours: magenta body, cyan top-right satellite, yellow middle dot -->
  <circle cx="105" cy="125" r="100" fill="#D63384"/>
  <circle cx="170" cy="65" r="55" fill="#FFFFFF"/>
  <circle cx="170" cy="65" r="48" fill="#3FA7DC"/>
  <circle cx="100" cy="85" r="32" fill="#FFFFFF"/>
  <circle cx="100" cy="85" r="26" fill="#FFE600"/>
  <!-- Wordmark: Youthfully Yours stacked, condensed display sans -->
  <g fill="#FFFFFF" font-family="'Bahnschrift Condensed', 'Oswald', 'Arial Narrow', sans-serif" font-weight="700" text-anchor="middle">
    <text x="105" y="170" font-size="34" letter-spacing="-1">youthfully</text>
    <text x="105" y="200" font-size="34" letter-spacing="-1">yours</text>
  </g>
  <!-- SK badge bottom-right, white fill with magenta outline -->
  <g transform="translate(178,200)">
    <text x="0" y="0" font-family="'Bahnschrift Condensed', 'Oswald', 'Arial Narrow', sans-serif" font-weight="800" font-size="38" letter-spacing="-1" fill="#FFFFFF" stroke="#D63384" stroke-width="2">SK</text>
  </g>
</svg>
